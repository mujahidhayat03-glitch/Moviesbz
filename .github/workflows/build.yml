name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'
          channel: 'stable'

      - name: Setup Android files
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          cat > android/settings.gradle << 'EOF'
          include ':app'
          def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
          def properties = new Properties()
          localPropertiesFile.withInputStream { properties.load(it) }
          def flutterSdkPath = properties.getProperty('flutter.sdk')
          assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
          apply from: "$flutterSdkPath/packages/flutter_tools/gradle/app_plugin_loader.gradle"
          EOF
          cat > android/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.7.10'
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          rootProject.buildDir = '../build'
          subprojects { project.buildDir = "${rootProject.buildDir}/${project.name}" }
          subprojects { project.evaluationDependsOn(':app') }
          tasks.register("clean", Delete) { delete rootProject.buildDir }
          EOF
          cat > android/app/build.gradle << 'EOF'
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) { localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) } }
          def flutterRoot = localProperties.getProperty('flutter.sdk')
          assert flutterRoot != null, "Flutter SDK not found."
          def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
          def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
          android {
              namespace "com.moviesbz.app"
              compileSdkVersion 34
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
              sourceSets { main.java.srcDirs += 'src/main/kotlin' }
              defaultConfig { applicationId "com.moviesbz.app"; minSdkVersion 21; targetSdkVersion 34; versionCode flutterVersionCode.toInteger(); versionName flutterVersionName }
              buildTypes { release { signingConfig signingConfigs.debug; minifyEnabled false; shrinkResources false } }
          }
          flutter { source '../..' }
          EOF
          echo "=== Files created ==="
          cat android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-shrink

      - uses: actions/upload-artifact@v4
        with:
          name: moviesbz-apk
          path: build/app/outputs/flutter-apk/app-release.apk
