name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Create settings.gradle.kts
        run: |
          FLUTTER_SDK=$(flutter --version --machine 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('flutterRoot',''))" 2>/dev/null || echo "$HOME/hostedtoolcache/flutter/stable-3.22.0-x64")
          cat > android/settings.gradle.kts << EOF
          pluginManagement {
              val flutterSdkPath = run {
                  val properties = java.util.Properties()
                  file("local.properties").inputStream().use { properties.load(it) }
                  val flutterSdkPath = properties.getProperty("flutter.sdk")
                  require(flutterSdkPath != null) { "flutter.sdk not set in local.properties" }
                  flutterSdkPath
              }
              includeBuild("\$flutterSdkPath/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id("dev.flutter.flutter-plugin-loader") version "1.0.0"
              id("com.android.application") version "8.1.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.10" apply false
          }
          include(":app")
          EOF
          rm -f android/settings.gradle

      - name: Build APK
        run: flutter build apk --release --no-shrink

      - uses: actions/upload-artifact@v4
        with:
          name: moviesbz-apk
          path: build/app/outputs/flutter-apk/app-release.apk
