name: moviesbz
description: movies.bz - Stream & Download Entertainment
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^6.1.0

  # Video
  video_player: ^2.8.3
  chewie: ^1.7.4

  # Network
  dio: ^5.4.3+1
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  # State
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  uuid: ^4.3.3

  # Firebase
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
